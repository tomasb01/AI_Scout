services:
  aiscout:
    build: .
    container_name: ai-scout
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./reports:/app/reports
    environment:
      - AISCOUT_GIT_TOKEN=${AISCOUT_GIT_TOKEN:-}
    restart: unless-stopped

