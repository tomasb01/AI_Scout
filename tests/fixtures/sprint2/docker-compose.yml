version: "3.9"
services:
  llm:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
  inference:
    image: vllm/vllm-openai:latest
    command: --model meta-llama/Llama-3-8B
  vectors:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
volumes:
  ollama:
